name: Build AlertaGlobal APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión del APK (ej: 1.0.2)'
        required: false
        default: 'beta'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Build & Sign APK Release

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 🔧 FIX: Cachea la distribución de Gradle y evita timeout en la descarga
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: wrapper

      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          python3 << 'PYEOF'
          import base64, os
          data = os.environ.get('KEYSTORE_B64', '')
          data = ''.join(data.split())
          if len(data) % 4:
              data += '=' * (4 - len(data) % 4)
          with open('android/app/keystore.jks', 'wb') as f:
              f.write(base64.b64decode(data))
          PYEOF

      - name: Dar permisos a Gradle
        working-directory: android
        run: chmod +x ./gradlew

      # 🔧 FIX: Aumenta timeout de red para la descarga de dependencias
      - name: Build APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Dorg.gradle.internal.http.connectionTimeout=180000 \
            -Dorg.gradle.internal.http.socketTimeout=180000 \
            -Dorg.gradle.daemon=false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlertaGlobal-${{ github.event.inputs.version }}.apk
          path: android/app/build/outputs/apk/release/*.apk
