name: Build AlertaGlobal APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - 'js/**'
      - 'css/**'
      - 'index.html'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Sign APK

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # Copiar archivos web al directorio assets del APK
      - name: Copiar web assets al APK
        run: |
          mkdir -p android/app/src/main/assets/www
          cp index.html android/app/src/main/assets/www/
          cp -r css android/app/src/main/assets/www/
          cp -r js android/app/src/main/assets/www/
          cp -r img android/app/src/main/assets/www/ 2>/dev/null || true
          cp manifest.json android/app/src/main/assets/www/ 2>/dev/null || true
          echo "Assets copiados:"
          ls android/app/src/main/assets/www/

      # Permisos para gradlew
      - name: Dar permisos a gradlew
        run: chmod +x android/gradlew

      # Build APK de debug (para pruebas rápidas)
      - name: Build APK Debug
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      # Build APK Release (firmado)
      - name: Build APK Release
        working-directory: android
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # Subir APK Debug como artifact
      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: AlertaGlobal-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # Subir APK Release como artifact
      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: AlertaGlobal-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      # Crear GitHub Release automático
      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' android/app/build.gradle.kts | grep -o '".*"' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: "AlertaGlobal v${{ steps.version.outputs.version }}"
          body: |
            ## 🌍 AlertaGlobal APK

            Aplicación de alertas de desastres naturales en tiempo real.

            ### Instalación
            1. Descarga `AlertaGlobal-release.apk`
            2. En tu Android: Ajustes → Seguridad → Fuentes desconocidas → Activar
            3. Instala el APK descargado

            ### Qué incluye
            - Monitoreo en tiempo real: sismos, volcanes, tsunamis, incendios, clima
            - Geolocalización por GPS + red móvil + WiFi
            - Alertas SAE de SENAPRED (Cell Broadcast)
            - Soporte offline con datos en caché
            - IA para análisis contextual (Cic_IA)

            ### Fuentes de datos
            USGS · EMSC · GFZ · NASA FIRMS · NASA EONET
            WeatherAPI · MET Norway · Open-Meteo
            GDACS ONU · NHC NOAA · PTWC · SENAPRED
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
