name: Build Signed APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version (ej: 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Copy web to Android assets
        run: |
          cp index.html android/app/src/main/assets/www/
          cp -r css android/app/src/main/assets/www/
          cp -r js android/app/src/main/assets/www/
          cp -r img android/app/src/main/assets/www/
          cp manifest.json android/app/src/main/assets/www/ 2>/dev/null || true

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/mis-juegos.keystore

      - name: Build APK
        working-directory: android
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew 2>/dev/null || gradle wrapper
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlertaGlobal-v${{ github.event.inputs.version_name }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90
