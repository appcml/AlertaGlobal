name: Build AlertaGlobal APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión del APK (ej: 1.0.2)'
        required: false
        default: 'beta'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Build & Sign APK Release

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ✅ Acción actualizada (la anterior está deprecada)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          python3 << 'PYEOF'
          import base64, os
          data = os.environ.get('KEYSTORE_B64', '')
          if not data:
              print("ERROR: El secret KEYSTORE_BASE64 está vacío")
              exit(1)
          data = ''.join(data.split())
          if len(data) % 4:
              data += '=' * (4 - len(data) % 4)
          with open('android/app/mis-juegos.keystore', 'wb') as f:
              f.write(base64.b64decode(data))
          print("Keystore decodificado correctamente")
          PYEOF

      # 🔍 DEBUG: Verificamos que el keystore exista
      - name: Verificar keystore y archivos
        working-directory: android
        run: |
          echo "=== Archivos en android/app/ ==="
          ls -la app/
          echo "=== Info del keystore ==="
          stat app/mis-juegos.keystore

      - name: Dar permisos a Gradle
        working-directory: android
        run: chmod +x ./gradlew

      - name: Build APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        working-directory: android
        run: |
          ./gradlew assembleRelease --stacktrace \
            -Dorg.gradle.internal.http.connectionTimeout=180000 \
            -Dorg.gradle.internal.http.socketTimeout=180000 \
            -Dorg.gradle.daemon=false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlertaGlobal-${{ github.event.inputs.version }}.apk
          path: android/app/build/outputs/apk/release/*.apk
