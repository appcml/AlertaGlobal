name: Build AlertaGlobal APK

# ✅ SOLO se ejecuta MANUALMENTE desde GitHub Actions
# Para construir: ve a Actions → Build AlertaGlobal APK → Run workflow
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión del APK (ej: 1.0.2)'
        required: false
        default: 'beta'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Sign APK Release

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          python3 << 'PYEOF'
          import base64, os, sys
          data = os.environ.get('KEYSTORE_B64', '')
          data = ''.join(data.split())
          if len(data) % 4:
              data += '=' * (4 - len(data) % 4)
          with open('android/app/keystore.jks', 'wb') as f:
              f.write(base64.b64decode(data))
          PYEOF

      # 🔧 FIX: Permisos de ejecución para gradlew
      - name: Dar permisos a Gradle
        working-directory: android
        run: chmod +x ./gradlew

      - name: Build APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlertaGlobal-${{ github.event.inputs.version }}.apk
          path: android/app/build/outputs/apk/release/*.apk
