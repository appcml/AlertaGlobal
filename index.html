<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6200EE">
    <meta name="description" content="Alertas de desastres naturales y clima en tiempo real">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Alerta Global</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="img/icon.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- TOOLBAR -->
    <header class="toolbar">
        <div class="toolbar-title">🌍 Alerta Global</div>
        <div class="toolbar-actions">
            <button class="toolbar-btn" id="btnFavorites" title="Ubicaciones favoritas">⭐</button>
            <button class="toolbar-btn" id="btnLang" title="Idioma">🌐</button>
            <button class="toolbar-btn" id="btnRefresh" title="Actualizar">🔄</button>
        </div>
    </header>

    <!-- TABS -->
    <nav class="tabs">
        <button class="tab active" data-tab="alertas">🚨 <span data-i18n="tab_alerts">Alertas</span></button>
        <button class="tab" data-tab="clima">🌤️ <span data-i18n="tab_weather">Clima</span></button>
        <button class="tab" data-tab="mapa">🗺️ <span data-i18n="tab_map">Mapa</span></button>
        <button class="tab" data-tab="tips">💡 Tips</button>
    </nav>

    <!-- CONTENT -->
    <main class="content">

        <!-- ALERTAS -->
        <section class="tab-panel active" id="panel-alertas">
            <div class="location-bar">
                <button class="location-btn" id="btnMyLocation">📍 <span id="currentLocationName">Detectando...</span></button>
                <button class="location-btn" id="btnSearchLocation">🔍 Buscar</button>
                <button class="location-btn fav-btn" id="btnStarAlert" title="Guardar en favoritos">☆</button>
            </div>
            <div class="loading" id="alertsLoading"><div class="spinner"></div><p>Cargando alertas...</p></div>
            <div class="alert-list" id="alertList"></div>
            <div class="error-msg" id="alertsError" style="display:none"></div>
        </section>

        <!-- CLIMA -->
        <section class="tab-panel" id="panel-clima">
            <div class="location-bar">
                <button class="location-btn" id="btnWeatherLocation">📍 <span id="weatherLocationName">Detectando...</span></button>
                <button class="location-btn" id="btnWeatherSearch">🔍 Buscar</button>
                <button class="location-btn fav-btn" id="btnStarWeather" title="Guardar en favoritos">☆</button>
            </div>
            <div class="loading" id="weatherLoading"><div class="spinner"></div><p>Obteniendo ubicación...</p></div>
            <div class="weather-container" id="weatherContainer" style="display:none">
                <div class="weather-city" id="wCity"></div>
                <div class="weather-temp" id="wTemp"></div>
                <div class="weather-desc" id="wDesc"></div>
                <div class="weather-details">
                    <div class="weather-detail"><span class="detail-icon">💧</span><span class="detail-label">Humedad</span><span class="detail-value" id="wHumidity"></span></div>
                    <div class="weather-detail"><span class="detail-icon">💨</span><span class="detail-label">Viento</span><span class="detail-value" id="wWind"></span></div>
                    <div class="weather-detail"><span class="detail-icon">🌡️</span><span class="detail-label">Sensación</span><span class="detail-value" id="wFeels"></span></div>
                    <div class="weather-detail"><span class="detail-icon">📊</span><span class="detail-label">Presión</span><span class="detail-value" id="wPressure"></span></div>
                </div>
                <div class="weather-recommendation" id="wRecommendation"></div>
            </div>
            <div class="error-msg" id="weatherError" style="display:none"></div>
        </section>

        <!-- MAPA -->
        <section class="tab-panel" id="panel-mapa">
            <div id="map" style="height:calc(100vh - 160px);min-height:400px;"></div>
        </section>

        <!-- TIPS -->
        <section class="tab-panel" id="panel-tips">
            <div class="tips-list" id="tipsList"></div>
        </section>

    </main>

    <footer class="ad-banner"><span>📢 AdMob</span></footer>
    <div class="toast" id="toast"></div>

    <!-- POPUP: BÚSQUEDA -->
    <div class="popup-overlay" id="searchPopup" style="display:none">
        <div class="popup">
            <h3>🔍 Buscar ubicación</h3>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Ciudad, país..." autocomplete="off">
                <button id="searchBtn">🔍</button>
            </div>
            <div class="search-results" id="searchResults"></div>
            <button class="popup-close" id="closeSearch">✕</button>
        </div>
    </div>

    <!-- POPUP: FAVORITOS -->
    <div class="popup-overlay" id="favoritesPopup" style="display:none">
        <div class="popup">
            <h3>⭐ Ubicaciones favoritas</h3>
            <div id="favoritesList"></div>
            <p id="favoritesEmpty" style="text-align:center;color:#999;padding:20px;display:none">No tienes favoritos guardados.<br>Toca ☆ en cualquier ubicación para guardarla.</p>
            <button class="popup-close" id="closeFavorites">✕</button>
        </div>
    </div>

    <!-- POPUP: COMPARTIR -->
    <div class="popup-overlay" id="sharePopup" style="display:none">
        <div class="popup">
            <h3>📤 Compartir alerta</h3>
            <div id="shareContent" style="background:#f5f5f5;border-radius:10px;padding:14px;font-size:13px;margin-bottom:16px;line-height:1.5"></div>
            <div class="share-grid">
                <button class="share-btn whatsapp" id="shareWhatsapp">
                    <span class="share-icon">💬</span> WhatsApp
                </button>
                <button class="share-btn twitter" id="shareTwitter">
                    <span class="share-icon">🐦</span> Twitter/X
                </button>
                <button class="share-btn facebook" id="shareFacebook">
                    <span class="share-icon">📘</span> Facebook
                </button>
                <button class="share-btn telegram" id="shareTelegram">
                    <span class="share-icon">✈️</span> Telegram
                </button>
                <button class="share-btn copy" id="shareCopy">
                    <span class="share-icon">📋</span> Copiar texto
                </button>
                <button class="share-btn native" id="shareNative" style="display:none">
                    <span class="share-icon">📤</span> Compartir
                </button>
            </div>
            <button class="popup-close" id="closeShare">✕</button>
        </div>
    </div>

    <!-- POPUP: IDIOMA -->
    <div class="popup-overlay" id="langPopup" style="display:none">
        <div class="popup">
            <h3>🌐 Idioma / Language</h3>
            <div class="lang-grid">
                <button class="lang-btn" data-lang="es">🇪🇸 Español</button>
                <button class="lang-btn" data-lang="en">🇺🇸 English</button>
                <button class="lang-btn" data-lang="pt">🇧🇷 Português</button>
                <button class="lang-btn" data-lang="fr">🇫🇷 Français</button>
                <button class="lang-btn" data-lang="de">🇩🇪 Deutsch</button>
                <button class="lang-btn" data-lang="ja">🇯🇵 日本語</button>
                <button class="lang-btn" data-lang="zh">🇨🇳 中文</button>
                <button class="lang-btn" data-lang="ko">🇰🇷 한국어</button>
            </div>
            <button class="popup-close" id="closeLang">✕</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/sources.js"></script>
    <script src="js/locations.js"></script>
    <script src="js/app.js"></script>
</body>
</html>v
