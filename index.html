<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Alertas de desastres naturales y clima en tiempo real">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Alerta Global</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="img/icon.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="toolbar">
        <div class="toolbar-title">🌍 Alerta Global</div>
        <div class="toolbar-actions">
            <button class="toolbar-btn" id="btnLang" title="Idioma">🌐</button>
            <button class="toolbar-btn" id="btnRefresh" title="Actualizar">🔄</button>
        </div>
    </header>

    <!-- Language selector popup -->
    <div class="popup-overlay" id="langPopup" style="display:none">
        <div class="popup">
            <h3 id="langTitle">Idioma / Language</h3>
            <div class="lang-grid">
                <button class="lang-btn" data-lang="es">🇪🇸 Español</button>
                <button class="lang-btn" data-lang="en">🇺🇸 English</button>
                <button class="lang-btn" data-lang="pt">🇧🇷 Português</button>
                <button class="lang-btn" data-lang="fr">🇫🇷 Français</button>
                <button class="lang-btn" data-lang="de">🇩🇪 Deutsch</button>
                <button class="lang-btn" data-lang="ja">🇯🇵 日本語</button>
                <button class="lang-btn" data-lang="zh">🇨🇳 中文</button>
                <button class="lang-btn" data-lang="ko">🇰🇷 한국어</button>
            </div>
            <button class="popup-close" id="closeLang">✕</button>
        </div>
    </div>

    <!-- Location search popup -->
    <div class="popup-overlay" id="searchPopup" style="display:none">
        <div class="popup">
            <h3 id="searchTitle">Buscar ubicación</h3>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Ciudad, país..." autocomplete="off">
                <button id="searchBtn">🔍</button>
            </div>
            <div class="search-results" id="searchResults"></div>
            <button class="popup-close" id="closeSearch">✕</button>
        </div>
    </div>

    <nav class="tabs" id="tabBar">
        <button class="tab active" data-tab="alertas">🚨 <span data-i18n="tab_alerts">Alertas</span></button>
        <button class="tab" data-tab="clima">🌤️ <span data-i18n="tab_weather">Clima</span></button>
        <button class="tab" data-tab="mapa">🗺️ <span data-i18n="tab_map">Mapa</span></button>
        <button class="tab" data-tab="tips">💡 Tips</button>
    </nav>

    <main class="content" id="content">
        <!-- Alertas -->
        <section class="tab-panel active" id="panel-alertas">
            <div class="location-bar">
                <button class="location-btn" id="btnMyLocation">📍 <span id="currentLocationName" data-i18n="detecting">Detectando...</span></button>
                <button class="location-btn" id="btnSearchLocation">🔍 <span data-i18n="search">Buscar</span></button>
            </div>
            <!-- Saved locations -->
            <div class="saved-locations" id="savedLocations"></div>
            <div class="loading" id="alertsLoading"><div class="spinner"></div><p data-i18n="loading_alerts">Cargando alertas...</p></div>
            <div class="alert-list" id="alertList"></div>
            <div class="error-msg" id="alertsError" style="display:none"></div>
        </section>

        <!-- Clima -->
        <section class="tab-panel" id="panel-clima">
            <div class="location-bar">
                <button class="location-btn" id="btnWeatherLocation">📍 <span id="weatherLocationName" data-i18n="detecting">Detectando...</span></button>
                <button class="location-btn" id="btnWeatherSearch">🔍 <span data-i18n="search">Buscar</span></button>
                <button class="location-btn" id="btnSaveLocation" title="Guardar ubicación">⭐</button>
            </div>
            <div class="saved-locations" id="weatherSavedLocations"></div>
            <div class="loading" id="weatherLoading"><div class="spinner"></div><p data-i18n="getting_location">Obteniendo ubicación...</p></div>
            <div class="weather-container" id="weatherContainer" style="display:none">
                <div class="weather-city" id="wCity"></div>
                <div class="weather-temp" id="wTemp"></div>
                <div class="weather-desc" id="wDesc"></div>
                <div class="weather-details">
                    <div class="weather-detail"><span class="detail-icon">💧</span><span class="detail-label" data-i18n="humidity">Humedad</span><span class="detail-value" id="wHumidity"></span></div>
                    <div class="weather-detail"><span class="detail-icon">💨</span><span class="detail-label" data-i18n="wind">Viento</span><span class="detail-value" id="wWind"></span></div>
                    <div class="weather-detail"><span class="detail-icon">🌡️</span><span class="detail-label" data-i18n="feels_like">Sensación</span><span class="detail-value" id="wFeels"></span></div>
                    <div class="weather-detail"><span class="detail-icon">📊</span><span class="detail-label" data-i18n="pressure">Presión</span><span class="detail-value" id="wPressure"></span></div>
                </div>
                <div class="weather-recommendation" id="wRecommendation"></div>
            </div>
            <div class="error-msg" id="weatherError" style="display:none"></div>
        </section>

        <!-- Mapa -->
        <section class="tab-panel" id="panel-mapa">
            <div id="map" style="height:calc(100vh - 160px);min-height:400px;"></div>
        </section>

        <!-- Tips -->
        <section class="tab-panel" id="panel-tips">
            <div class="tips-list" id="tipsList"></div>
        </section>
    </main>

    <footer class="ad-banner"><span>📢 AdMob</span></footer>
    <div class="toast" id="toast"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/locations.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
